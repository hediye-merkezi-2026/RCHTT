<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TURKISH EXPRESS</title>
<style>
    :root{
        --bg-1:#0a0a0a;
        --bg-2:#1a1a1a;
        --panel:#141414;
        --panel-2:#1e1e1e;
        --border:#2c2c2c;
        --border-light:#3a3a3a;
        --text:#e5e5e5;
        --text-dim:#8a8a8a;
        --text-faint:#5a5a5a;
        --accent:#c8c8c8;
        --accent-dark:#4a4a4a;
        --danger:#7a7a7a;
        --success:#e0e0e0;
    }

    *{ box-sizing:border-box; }

    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background-color:var(--bg-1);
        background-image:
            linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
        background-size:42px 42px;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color:var(--text);
        overflow:hidden;
        position:relative;
    }

    /* Yumuşak, hafif hareketli ışık lekeleri */
    .blob{
        position:absolute;
        border-radius:50%;
        filter:blur(60px);
        opacity:0.35;
        pointer-events:none;
        z-index:0;
    }

    .blob-1{
        width:420px; height:420px;
        top:-120px; left:-100px;
        background:radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
        animation:driftA 16s ease-in-out infinite;
    }

    .blob-2{
        width:380px; height:380px;
        bottom:-140px; right:-100px;
        background:radial-gradient(circle, rgba(255,255,255,0.06), transparent 70%);
        animation:driftB 20s ease-in-out infinite;
    }

    @keyframes driftA{
        0%,100%{ transform:translate(0,0); }
        50%{ transform:translate(40px, 30px); }
    }

    @keyframes driftB{
        0%,100%{ transform:translate(0,0); }
        50%{ transform:translate(-30px, -40px); }
    }

    /* Kenarlara doğru koyulaşan vinyet */
    .vignette{
        position:absolute;
        top:0; left:0; right:0; bottom:0;
        background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.55) 100%);
        pointer-events:none;
        z-index:0;
    }

    /* Hareketli arka plan parçacıkları */
    .particle{
        position:absolute;
        border-radius:50%;
        background:rgba(255,255,255,0.03);
        pointer-events:none;
        animation:floatUp linear infinite;
    }

    @keyframes floatUp{
        0%{ transform:translateY(0) translateX(0); opacity:0; }
        10%{ opacity:1; }
        90%{ opacity:1; }
        100%{ transform:translateY(-110vh) translateX(20px); opacity:0; }
    }

    @keyframes softSlideUp{
        from{ opacity:0; transform:translateY(24px) scale(0.98); }
        to{ opacity:1; transform:translateY(0) scale(1); }
    }

    @keyframes borderGlow{
        0%,100%{ box-shadow:0 0 0 0 rgba(255,255,255,0.0), 0 25px 60px rgba(0,0,0,0.6); }
        50%{ box-shadow:0 0 0 1px rgba(255,255,255,0.05), 0 25px 60px rgba(0,0,0,0.6); }
    }

    .card{
        position:relative;
        background:linear-gradient(160deg, var(--panel) 0%, var(--panel-2) 100%);
        padding:50px 40px;
        border-radius:22px;
        border:1px solid var(--border);
        text-align:center;
        width:320px;
        z-index:2;
        animation:softSlideUp 0.9s cubic-bezier(0.16,1,0.3,1), borderGlow 4s ease-in-out infinite;
    }

    .lock-icon{
        width:56px;
        height:56px;
        margin:0 auto 20px;
        border-radius:50%;
        background:linear-gradient(160deg, #2a2a2a, #151515);
        border:1px solid var(--border-light);
        display:flex;
        align-items:center;
        justify-content:center;
        transition:all 0.4s ease;
    }

    .lock-icon svg{
        width:22px;
        height:22px;
        stroke:var(--text-dim);
        fill:none;
        stroke-width:1.6;
        transition:all 0.4s ease;
    }

    .lock-icon.unlocked{
        border-color:rgba(255,255,255,0.25);
        background:linear-gradient(160deg, #333, #1a1a1a);
    }
    .lock-icon.unlocked svg{ stroke:var(--success); }

    h2{
        margin:0 0 28px;
        font-weight:700;
        letter-spacing:3px;
        font-size:19px;
        color:var(--text);
        text-transform:uppercase;
    }

    h2 span{
        color:var(--text-faint);
        font-weight:400;
    }

    .input-wrap{
        position:relative;
        margin-bottom:18px;
    }

    input{
        padding:15px 20px;
        width:100%;
        background:#0f0f0f;
        color:var(--text);
        border:1px solid var(--border);
        border-radius:14px;
        text-align:center;
        font-size:15px;
        letter-spacing:2px;
        transition:all 0.35s ease;
        outline:none;
    }

    input::placeholder{ color:var(--text-faint); letter-spacing:1px; }

    input:focus{
        border-color:var(--border-light);
        background:#141414;
        box-shadow:0 0 0 4px rgba(255,255,255,0.04);
    }

    input.shake{
        animation:shake 0.4s ease;
        border-color:#555;
    }

    @keyframes shake{
        0%,100%{ transform:translateX(0); }
        20%{ transform:translateX(-6px); }
        40%{ transform:translateX(6px); }
        60%{ transform:translateX(-4px); }
        80%{ transform:translateX(4px); }
    }

    #durum{
        font-size:13px;
        margin-bottom:24px;
        min-height:18px;
        font-weight:500;
        color:var(--text-faint);
        transition:color 0.3s ease;
        letter-spacing:0.3px;
    }

    #durum.ok{ color:var(--success); }
    #durum.err{ color:var(--danger); }

    @keyframes softFadeIn{
        from{ opacity:0; transform:translateY(10px); }
        to{ opacity:1; transform:translateY(0); }
    }

    #indirBtn{
        display:none;
        background:linear-gradient(135deg, #3a3a3a 0%, #1c1c1c 100%);
        color:var(--text);
        padding:14px 34px;
        text-decoration:none;
        border-radius:14px;
        font-weight:600;
        letter-spacing:1px;
        border:1px solid var(--border-light);
        transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
        font-size:14px;
    }

    #indirBtn:hover{
        transform:translateY(-2px);
        background:linear-gradient(135deg, #454545 0%, #262626 100%);
        border-color:#555;
    }

    #indirBtn:active{
        transform:translateY(0px);
    }

    .attempts{
        margin-top:16px;
        font-size:11px;
        color:var(--text-faint);
        letter-spacing:0.5px;
    }

    /* Üst durum rozeti */
    .badge{
        position:relative;
        z-index:2;
        display:flex;
        align-items:center;
        gap:8px;
        background:rgba(255,255,255,0.03);
        border:1px solid var(--border);
        border-radius:20px;
        padding:6px 14px;
        margin-bottom:18px;
        font-size:11px;
        letter-spacing:0.8px;
        color:var(--text-dim);
        text-transform:uppercase;
    }

    .badge .dot{
        width:6px;
        height:6px;
        border-radius:50%;
        background:var(--text-dim);
        box-shadow:0 0 6px rgba(255,255,255,0.4);
        animation:pulseDot 2s ease-in-out infinite;
    }

    @keyframes pulseDot{
        0%,100%{ opacity:0.5; transform:scale(0.9); }
        50%{ opacity:1; transform:scale(1.1); }
    }

    .card:hover{
        transform:translateY(-2px);
    }

    .card{
        transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    /* İnce ayırıcı çizgi */
    .divider{
        height:1px;
        background:linear-gradient(90deg, transparent, var(--border-light), transparent);
        margin:0 0 24px;
    }

    /* Alt köşe imzası */
    .watermark{
        position:fixed;
        bottom:16px;
        right:20px;
        font-size:11px;
        color:var(--text-faint);
        letter-spacing:0.5px;
        z-index:2;
        opacity:0.7;
    }

    .watermark .sep{
        margin:0 6px;
        opacity:0.5;
    }
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="vignette"></div>

<div class="card">
    <div class="lock-icon" id="lockIcon">
        <svg viewBox="0 0 24 24">
            <rect x="5" y="11" width="14" height="9" rx="2"></rect>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"></path>
        </svg>
    </div>

    <h2>TURKISH <span>EXPRESS</span></h2>

    <div class="badge"><span class="dot"></span>Şifreli Bağlantı</div>

    <div class="divider"></div>

    <div class="input-wrap">
        <input type="password" id="sifreKutusu" placeholder="Anahtarı girin..." autocomplete="off">
    </div>

    <div id="durum">Anahtar bekleniyor...</div>

    <a href="#" target="_blank" id="indirBtn" rel="noopener">İndirmeyi Başlat</a>

    <div class="attempts" id="denemeSayaci"></div>
</div>

<div class="watermark">TURKISH EXPRESS<span class="sep">·</span>v1.0</div>

<script>
    // Şifrelenmiş link verisi (offset tabanlı kodlama)
    const gizliVeri = [
        187, 192, 196, 192, 165, 106, 104, 96, 183, 190, 185, 198, 151, 94, 160, 160,
        194, 179, 188, 181, 96, 147, 168, 158, 130, 178, 185, 188, 151, 95, 157, 96,
        132, 129, 163, 156, 103, 155, 141, 169, 165, 155, 159, 180, 140, 146, 163, 134,
        189, 152, 182, 195, 158, 166, 139, 165, 154, 176, 162, 199, 118, 137, 158, 125,
        164, 123, 198, 185, 151, 167, 120, 166, 198, 188, 141, 195, 154, 145, 171, 154,
        193, 179
    ];

    const input = document.getElementById('sifreKutusu');
    const btn = document.getElementById('indirBtn');
    const durum = document.getElementById('durum');
    const lockIcon = document.getElementById('lockIcon');
    const denemeSayaci = document.getElementById('denemeSayaci');
    const badge = document.querySelector('.badge');
    const badgeDot = document.querySelector('.badge .dot');

    let yanlisDeneme = 0;
    let kilitli = false;
    let debounceTimer = null;

    // Basit checksum ile ilk aşamada anahtar formatını doğrula (kaba kuvvet gecikmesi için)
    function basitChecksum(str){
        let h = 0;
        for(let i=0;i<str.length;i++){
            h = (h * 31 + str.charCodeAt(i)) % 1000000007;
        }
        return h;
    }

    function cozAnahtar(girilen){
        let sonuc = "";
        for (let i = 0; i < gizliVeri.length; i++) {
            sonuc += String.fromCharCode(gizliVeri[i] - girilen.charCodeAt(i % girilen.length));
        }
        return sonuc;
    }

    function kilitleUI(){
        input.disabled = true;
        btn.style.display = "none";
        durum.className = "err";
        durum.innerText = "Çok fazla hatalı deneme. 15 saniye bekleyin.";
        kilitli = true;
        setTimeout(() => {
            input.disabled = false;
            kilitli = false;
            yanlisDeneme = 0;
            denemeSayaci.innerText = "";
            durum.className = "";
            durum.innerText = "Anahtar bekleniyor...";
            input.focus();
        }, 15000);
    }

    function kontrolEt(){
        if(kilitli) return;

        const girilen = input.value;

        if (girilen.length === 0){
            btn.style.display = "none";
            durum.className = "";
            durum.innerText = "Anahtar bekleniyor...";
            lockIcon.classList.remove("unlocked");
            badge.lastChild.textContent = "Şifreli Bağlantı";
            badgeDot.style.background = "";
            return;
        }

        try{
            const cozulmusUrl = cozAnahtar(girilen);

            if (cozulmusUrl.startsWith("https://drive.google.com/")){
                btn.href = cozulmusUrl;
                btn.style.display = "inline-block";
                btn.style.animation = "softFadeIn 0.5s cubic-bezier(0.16,1,0.3,1)";
                durum.className = "ok";
                durum.innerText = "Erişim sağlandı ✓";
                lockIcon.classList.add("unlocked");
                badge.lastChild.textContent = "Erişim Açık";
                badgeDot.style.background = "var(--success)";
                yanlisDeneme = 0;
                denemeSayaci.innerText = "";
            } else {
                btn.style.display = "none";
                lockIcon.classList.remove("unlocked");
                durum.className = "err";
                durum.innerText = "Hatalı anahtar.";
                badge.lastChild.textContent = "Şifreli Bağlantı";
                badgeDot.style.background = "";
            }
        } catch(e){
            btn.style.display = "none";
            lockIcon.classList.remove("unlocked");
            durum.className = "err";
            durum.innerText = "Hatalı anahtar.";
            badge.lastChild.textContent = "Şifreli Bağlantı";
            badgeDot.style.background = "";
        }
    }

    // Debounce ile giriş kontrolü + hatalı deneme sayacı (kaba kuvvete karşı basit önlem)
    input.addEventListener('input', () => {
        if(kilitli) return;
        clearTimeout(debounceTimer);

        debounceTimer = setTimeout(() => {
            const oncekiDurum = durum.innerText;
            kontrolEt();

            if(durum.innerText === "Hatalı anahtar."){
                yanlisDeneme++;
                denemeSayaci.innerText = `Hatalı deneme: ${yanlisDeneme}/5`;
                input.classList.add("shake");
                setTimeout(() => input.classList.remove("shake"), 400);

                if(yanlisDeneme >= 5){
                    kilitleUI();
                }
            }
        }, 250);
    });

    // Arka plan parçacıkları
    function parcacikOlustur(){
        const p = document.createElement('div');
        const size = Math.random() * 4 + 2;
        p.className = "particle";
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * 100 + "vw";
        p.style.bottom = "-10px";
        p.style.animationDuration = (Math.random() * 10 + 8) + "s";
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 20000);
    }
    setInterval(parcacikOlustur, 600);
    for(let i=0;i<8;i++) setTimeout(parcacikOlustur, i*300);

    window.onload = () => input.focus();
</script>

</body>
</html>
